<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'rel='stylesheet'>
    <link rel="stylesheet" href="styles2.css"> 
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <script src="https://kit.fontawesome.com/605075fdfc.js" crossorigin="anonymous"></script>
    <title>SIGN-UP</title>
    <link rel="icon" href="img/favicon.ico" type="image/png">
</head>

<body>
    <div class="title">   
        <h1>PGF AGRO</h1>
    </div>

    <div class="icons">
        <a href="https://www.instagram.com" target="_blank">
        <i class="fa-brands fa-instagram"></i>
        </a>
        <a href="https://gmail.com" target="_blank">
        <i class="fa-regular fa-envelope"></i>
        </a>
    </div>

    <div class="logo"> 
        <a href="index.html">
        <img src="img/logo.png">
        </a>
    </div>
    
    <main class="container">
        <form>
            <h2>Sign Up</h2>
            <p>
            Already a Member ?<a href="index.html">Login</a>
            </p>

            <div class="input-box">
                <input placeholder="Usuário (CPF)" type="email">
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input placeholder="Email" type="email">
                <i class="fa-regular fa-envelope"></i>
            </div>

            <div class="input-box">
                <input placeholder="Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="input-box">
                <input placeholder="Confirme sua Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>

            <a href="index4.html">
            <button type="button" class="signup">Sign Up</button>
            </a>

            <div class="login-with">
                <p>or sign up with</p>
            </div>

            <div class="login-icons">
                <a href="https://accounts.google.com/" target="_blank">
                <i class="fa-brands fa-google"></i>
                </a> 

                <a href="https://www.google.com/url?sa=t&rct=j&q=&esrc=s&source=web&cd=&cad=rja&uact=8&ved=2ahUKEwivyvOxk76TAxXFpZUCHe50CnwQFnoECBsQAQ&url=https%3A%2F%2Fwww.facebook.com%2Flogin%2F%3Flocale%3Dpt_BR&usg=AOvVaw3N-3Srp6F3LHTdHWdQNEEL&opi=89978449" target="_blank">
                <i class="fa-brands fa-facebook"></i>
                </a>
            </div>
        </form>
    </main>
</body>
</html>

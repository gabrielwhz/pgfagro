<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'rel='stylesheet'>
     <link rel="stylesheet" href="styles.css"> 
     <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
     <script src="https://kit.fontawesome.com/605075fdfc.js" crossorigin="anonymous"></script>
    <title>PGF AGRO</title>
</head>

<body>

<!--TOPO DA PAGINA-->
    
    <div class="title">
        <h1>PGF AGRO</h1>
    </div>

    <div class="icons">
        <a href="https://www.instagram.com" target="_blank">
        <i class="fa-brands fa-instagram"></i>
        </a>

        <a href="https://gmail.com" target="_blank">
        <i class="fa-regular fa-envelope"></i>
        </a>
    </div>

    <div class="logo">
        <a href="index.html">
        <img src="/img/logo.png">
        </a>
    </div>
    
<!--CAIXA DE LOGIN-->

    <main class="container">
        <form>
            <h2>Login</h2>

            <div class="input-box">
                <input placeholder="Usuário (CPF)" type="email">
                <i class="bx bxs-user"></i>
            </div>

            <div class="input-box">
                <input placeholder="Senha" type="password">
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="remember-forgot">
                <label>
                <input type="checkbox">  
                Remember-Me                     
                </label>                                                   
                <a href="index3.html">Forgot Password?</a>
            </div>

            <a href="index4.html">
                <button type="button" class="login">Login</button>
            </a>

            <div class="register-question">
                <p>Don't have an account ?</p>
            </div>
            
            <div class="register-link">
                <a href="index2.html">Sign-Up</a>
            </div>
        </form>
    </main>

</body>
</html>
